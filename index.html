<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shooter Game</title>
    <link rel="stylesheet" href="shooter-styles.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="hud">
            <div class="hud-left">
                <div class="health-bar">
                    <div class="health-fill" id="healthBar"></div>
                </div>
                <p>Health: <span id="healthText">100</span>/100</p>
            </div>

            <div class="hud-center">
                <div class="crosshair"></div>
                <p class="ammo-count">Ammo: <span id="ammoText">30</span>/120</p>
            </div>

            <div class="hud-right">
                <p>Kills: <span id="killsText">0</span></p>
                <p>Score: <span id="scoreText">0</span></p>
                <p>Level: <span id="levelText">1</span></p>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="game-menu" id="gameMenu">
            <div class="menu-content">
                <h1>3D SHOOTER</h1>
                <button id="startBtn" class="menu-btn">START GAME</button>
                <button id="settingsBtn" class="menu-btn">SETTINGS</button>
                <button id="controlsBtn" class="menu-btn">CONTROLS</button>
            </div>
        </div>

        <div class="pause-menu" id="pauseMenu" style="display: none;">
            <div class="menu-content">
                <h2>PAUSED</h2>
                <button id="resumeBtn" class="menu-btn">RESUME (P)</button>
                <button id="menuBtn" class="menu-btn">MAIN MENU</button>
            </div>
        </div>

        <div class="game-over-menu" id="gameOverMenu" style="display: none;">
            <div class="menu-content">
                <h2>GAME OVER</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <p>Kills: <span id="finalKills">0</span></p>
                <button id="restartBtn" class="menu-btn">RESTART GAME</button>
                <button id="mainMenuBtn" class="menu-btn">MAIN MENU</button>
            </div>
        </div>

        <div class="settings-panel" id="settingsPanel" style="display: none;">
            <div class="settings-content">
                <h2>SETTINGS</h2>
                <div class="setting">
                    <label>Master Volume: <span id="volumeValue">50</span>%</label>
                    <input type="range" id="volumeSlider" min="0" max="100" value="50">
                </div>
                <div class="setting">
                    <label>Sensitivity: <span id="sensitivityValue">1.0</span></label>
                    <input type="range" id="sensitivitySlider" min="0.1" max="2" step="0.1" value="1">
                </div>
                <div class="setting">
                    <label>
                        <input type="checkbox" id="inverted" checked> Invert Y-Axis
                    </label>
                </div>
                <button id="backBtn" class="menu-btn">BACK</button>
            </div>
        </div>

        <div class="controls-panel" id="controlsPanel" style="display: none;">
            <div class="controls-content">
                <h2>CONTROLS</h2>
                <div class="control-list">
                    <p><strong>W/A/S/D</strong> - Move</p>
                    <p><strong>SPACE</strong> - Jump</p>
                    <p><strong>MOUSE</strong> - Look Around</p>
                    <p><strong>LEFT CLICK</strong> - Shoot</p>
                    <p><strong>R</strong> - Reload</p>
                    <p><strong>1/2/3</strong> - Switch Weapons</p>
                    <p><strong>P</strong> - Pause Game</p>
                    <p><strong>ESC</strong> - Exit to Menu</p>
                </div>
                <button id="backBtn2" class="menu-btn">BACK</button>
            </div>
        </div>

        <div class="notification" id="notification"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="shooter-game.js"></script>
</body>
</html>
